# Tooling config for the kit's OWN files. The cookbook-derived modules
# (modal_sandbox_webhook.py, sandbox_runner.py, and the example's
# sandbox_runner.py) are deliberately excluded from ruff so they stay
# byte-faithful to the upstream Anthropic reference -- see the README section
# "How it differs from the Anthropic cookbook".

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
    "modal_sandbox_webhook.py",
    "sandbox_runner.py",
    "examples/internal_data_kit/sandbox_runner.py",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
