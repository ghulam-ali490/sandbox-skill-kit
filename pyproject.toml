# Tooling config for the kit's OWN files. The two cookbook-derived modules
# (modal_sandbox_webhook.py and sandbox_runner.py) are deliberately excluded
# from ruff so they stay byte-faithful to the upstream Anthropic reference --
# see the README section "How it differs from the Anthropic cookbook". The
# per-example sandbox_runner.py files (one per example kit) are
# kit-original wiring layers (they import from each example's *_tools
# module, which has no upstream equivalent) and ARE linted at project level
# without issue, so no per-example exclude is needed.

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
# Put the repo root on sys.path so tests can `import modal_sandbox_webhook`
# under a bare `pytest` invocation (not just `python -m pytest`).
pythonpath = ["."]
addopts = "-q"

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
    "modal_sandbox_webhook.py",
    "sandbox_runner.py",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
